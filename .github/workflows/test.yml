name: Test

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest \
            tests/test_matcreator_agent.py \
            tests/test_ports_config.py \
            tests/test_matcreator_cli_ports.py \
            tests/test_web_ports.py \
            tests/test_compose_ports.py \
            tests/test_vite_config_ports.py \
            -v
